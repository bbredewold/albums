<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bert — favorite artists &amp; albums</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- js-yaml from CDN: parses data.yaml client-side at load. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; }

  :root{
    --bg:#f4efe6; --ink:#221c14; --ink-soft:#6e6555; --muted:#8a8071;
    --line:#ded5c5; --tile:#e8e0d1; --hatch:#d4cab6;
    --accent:#2f7d52; --accent-soft:rgba(47,125,82,0.09);
  }
  html[data-theme="dark"]{
    --bg:#141009; --ink:#ece4d6; --ink-soft:#b3a994; --muted:#8b8270;
    --line:#2b261d; --tile:#211c14; --hatch:#2e2820;
    --accent:#6cba8a; --accent-soft:rgba(108,186,138,0.10);
  }

  body{
    background:var(--bg); color:var(--ink);
    font-family:"Newsreader", Georgia, serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100dvh;
    transition:background-color .4s ease, color .4s ease;
  }
  .mono{ font-family:"JetBrains Mono", ui-monospace, monospace; }

  .wrap{ max-width:1100px; margin:0 auto; padding:clamp(30px,6vw,76px) clamp(20px,5vw,56px) clamp(48px,7vw,90px); }

  /* Header */
  header.page{ display:flex; justify-content:space-between; align-items:flex-start; gap:24px; flex-wrap:wrap; margin-bottom:clamp(34px,5vw,60px); }
  .eyebrow{ font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
  h1{ margin:0; font-weight:400; font-size:clamp(36px,5.6vw,60px); line-height:1.0; letter-spacing:-.02em; color:var(--ink); }
  .subtitle{ font-size:clamp(11px,1.3vw,12.5px); letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-top:16px; }

  .toggle{
    display:inline-flex; align-items:center; gap:9px;
    font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink);
    background:transparent; border:1px solid var(--line); border-radius:999px;
    padding:10px 17px; cursor:pointer;
    transition:border-color .2s ease, color .2s ease;
  }
  .toggle:hover{ border-color:var(--accent); color:var(--accent); }
  .toggle .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); display:inline-block; }

  /* Columns */
  .columns{ display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:clamp(30px,5vw,68px); }
  section{ min-width:0; }
  .col-head{ display:flex; justify-content:space-between; align-items:baseline; padding-bottom:11px; border-bottom:1.5px solid var(--ink); margin-bottom:2px; }
  .col-head .label{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink); }
  .col-head .count{ font-size:12px; letter-spacing:.08em; color:var(--muted); }

  ul.list{ list-style:none; margin:0; padding:0; }
  li.row{ display:flex; align-items:center; gap:clamp(12px,1.6vw,18px); padding:clamp(11px,1.4vw,15px) 6px; border-bottom:1px solid var(--line); border-radius:6px; transition:background-color .15s ease; }
  li.row:hover{ background-color:var(--accent-soft); }

  .rank{ font-size:clamp(11px,1vw,12.5px); color:var(--accent); min-width:22px; text-align:right; flex-shrink:0; }

  .tile{ position:relative; width:clamp(54px,7vw,72px); aspect-ratio:1/1; border-radius:4px; overflow:hidden; flex-shrink:0; background:var(--tile); border:1px solid var(--line); display:grid; place-items:center; }
  .tile .cover{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .tile .initials{ font-family:"Newsreader", serif; font-weight:400; font-size:clamp(17px,2.2vw,23px); color:var(--ink-soft); letter-spacing:.02em; }

  .rowtext{ display:flex; flex-direction:column; gap:3px; min-width:0; }
  .rowtext .name{ font-family:"Newsreader", serif; font-weight:500; font-size:clamp(18px,2.1vw,22px); line-height:1.14; letter-spacing:-.01em; color:var(--ink); }
  .rowtext .note{ font-family:"Newsreader", serif; font-style:italic; font-size:clamp(13px,1.4vw,15px); line-height:1.3; color:var(--muted); }
  .rowtext .meta{ font-family:"JetBrains Mono", ui-monospace, monospace; font-size:clamp(11px,1.2vw,12.5px); letter-spacing:.02em; color:var(--muted); }

  footer.page{ margin-top:clamp(44px,6vw,76px); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

  .err{ font-family:"JetBrains Mono", monospace; font-size:13px; color:var(--accent); padding:20px 0; }
</style>
</head>
<body>
  <div class="wrap">
    <header class="page">
      <div>
        <div class="eyebrow mono">Personal favorites</div>
        <h1>Bert</h1>
        <div class="subtitle mono">Favorite artists &amp; albums</div>
      </div>
      <button id="themeToggle" class="toggle mono" type="button" aria-label="Toggle color theme">
        <span class="dot"></span><span id="themeLabel">Dark mode</span>
      </button>
    </header>

    <div class="columns">
      <section>
        <div class="col-head">
          <span class="label mono">Artists</span>
          <span class="count mono" id="artistsCount">00</span>
        </div>
        <ul class="list" id="artists"></ul>
      </section>

      <section>
        <div class="col-head">
          <span class="label mono">Albums</span>
          <span class="count mono" id="albumsCount">00</span>
        </div>
        <ul class="list" id="albums"></ul>
      </section>
    </div>

    <footer class="page mono">Ranked by feeling · top is most loved</footer>
  </div>

<script>
(function () {
  "use strict";

  // ---- Theme (persisted) ----
  var root = document.documentElement;
  var btn = document.getElementById("themeToggle");
  var label = document.getElementById("themeLabel");

  function applyTheme(t) {
    root.setAttribute("data-theme", t);
    label.textContent = t === "dark" ? "Light mode" : "Dark mode";
  }
  var stored = null;
  try { stored = localStorage.getItem("fav-theme"); } catch (e) {}
  applyTheme(stored || "light");

  btn.addEventListener("click", function () {
    var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
    applyTheme(next);
    try { localStorage.setItem("fav-theme", next); } catch (e) {}
  });

  // ---- Helpers ----
  function initials(s) {
    var clean = String(s).replace(/[^A-Za-z ]/g, " ").trim().split(/\s+/).filter(Boolean);
    if (clean.length >= 2) return (clean[0][0] + clean[1][0]).toUpperCase();
    if (clean[0]) return clean[0].slice(0, 2).toUpperCase();
    return "#";
  }

  function initialsSpan(name) {
    var s = document.createElement("span");
    s.className = "initials";
    s.textContent = initials(name);
    return s;
  }

  // Square tile: real cover if present (graceful fallback to initials), else initials.
  function buildTile(entry) {
    var box = document.createElement("div");
    box.className = "tile";
    if (entry.img) {
      var img = document.createElement("img");
      img.className = "cover";
      img.alt = entry.name || "";
      img.loading = "lazy";
      img.onerror = function () { box.innerHTML = ""; box.appendChild(initialsSpan(entry.name)); };
      img.src = entry.img;
      box.appendChild(img);
    } else {
      box.appendChild(initialsSpan(entry.name));
    }
    return box;
  }

  function buildRow(entry, i, kind) {
    var li = document.createElement("li");
    li.className = "row";

    var rank = document.createElement("span");
    rank.className = "rank mono";
    rank.textContent = String(i + 1).padStart(2, "0");

    var text = document.createElement("div");
    text.className = "rowtext";

    var name = document.createElement("span");
    name.className = "name";
    name.textContent = entry.name || "";
    text.appendChild(name);

    if (kind === "album") {
      var parts = [];
      if (entry.artist) parts.push(entry.artist);
      if (entry.year) parts.push(String(entry.year));
      if (parts.length) {
        var meta = document.createElement("span");
        meta.className = "meta";
        meta.textContent = parts.join("  ·  ");
        text.appendChild(meta);
      }
    } else if (entry.note) {
      var note = document.createElement("span");
      note.className = "note";
      note.textContent = entry.note;
      text.appendChild(note);
    }

    li.appendChild(rank);
    li.appendChild(buildTile(entry));
    li.appendChild(text);
    return li;
  }

  function renderList(listId, countId, items, kind) {
    var ul = document.getElementById(listId);
    ul.innerHTML = "";
    (items || []).forEach(function (entry, i) {
      ul.appendChild(buildRow(entry, i, kind));
    });
    document.getElementById(countId).textContent =
      String((items || []).length).padStart(2, "0");
  }

  // ---- Load data ----
  fetch("data.yaml", { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function (txt) {
      var data = window.jsyaml.load(txt) || {};
      renderList("artists", "artistsCount", data.artists, "artist");
      renderList("albums", "albumsCount", data.albums, "album");
    })
    .catch(function (err) {
      var wrap = document.querySelector(".columns");
      wrap.innerHTML = '<div class="err">Could not load data.yaml (' +
        String(err.message) +
        '). Serve this page over HTTP — fetch does not work from file://.</div>';
    });
})();
</script>
</body>
</html>
