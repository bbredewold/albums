<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bert — favorite artists &amp; albums</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- js-yaml from CDN: parses data.yaml client-side at load. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header class="page">
      <div class="topbar">
        <span class="eyebrow mono">Bert&rsquo;s personal canon</span>
        <button id="themeToggle" class="toggle mono" type="button" aria-label="Toggle color theme">
          <span class="dot"></span><span id="themeLabel">Dark mode</span>
        </button>
      </div>
      <h1 class="nameplate">Favorite artists<br>&amp; <em>albums</em></h1>
      <p class="tagline mono">A living, ranked list &mdash; re-sorted whenever my ears change their mind</p>
    </header>

    <div class="columns">
      <section>
        <div class="col-head">
          <span class="label mono">Artists</span>
          <span class="count mono" id="artistsCount">00</span>
        </div>
        <ul class="list" id="artists"></ul>
      </section>

      <section>
        <div class="col-head">
          <span class="label mono">Albums</span>
          <span class="count mono" id="albumsCount">00</span>
        </div>
        <ul class="list" id="albums"></ul>
      </section>
    </div>

    <footer class="page mono">Ranked by feeling<span id="updated"></span></footer>
  </div>

<script src="app.js"></script>
</body>
</html>
